name: Weekly Plays Ingestion

on:
  schedule:
    - cron: '0 4 * * 1-5'  # 4 AM UTC, Monday through Friday

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
      working-directory: service
    
    - name: Run weekly plays ingestion
      run: python -m scripts.etl.ingestions.ingest_weekly_plays
      working-directory: service